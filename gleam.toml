name = "factos"
version = "1.0.0"
description = "Store-independent context-first Event Sourcing primitives for Gleam."
licences = ["MIT"]
links = [
  { title = "Simply Event Sourcing", href = "https://ricofritzsche.me/simply-event-sourcing/" },
]
[repository]
type = "github"
user = "renatillas"
repo = "factos"

[[documentation.pages]]
title = "Core Model"
path = "core-model.html"
source = "./docs/core-model.md"

[[documentation.pages]]
title = "PostgreSQL Backend"
path = "postgresql-backend.html"
source = "./docs/postgresql-backend.md"

[[documentation.pages]]
title = "Event Logs and Command Dispatch"
path = "event-sourcing.html"
source = "./docs/event-sourcing.md"

[[documentation.pages]]
title = "Factos and Domain-Driven Design"
path = "domain-driven-design.html"
source = "./docs/domain-driven-design.md"

