services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "54329:5432"
    environment:
      POSTGRES_DB: cqrs_test
      POSTGRES_USER: cqrs
      POSTGRES_PASSWORD: cqrs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cqrs -d cqrs_test"]
      interval: 1s
      timeout: 5s
      retries: 30
