name = "factos_sqlight"
version = "1.0.0"
description = "SQLite backend for Factos context-first Event Sourcing using sqlight."
licences = ["Apache-2.0"]
links = [
  { title = "Factos", href = "https://factos.hexdocs.pm" },
  { title = "Simply Event Sourcing", href = "https://ricofritzsche.me/simply-event-sourcing/" },
]

[dependencies]
factos = { path = "../.." }
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
sqlight = ">= 1.1.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
