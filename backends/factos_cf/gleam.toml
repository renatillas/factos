name = "factos_cf"
version = "1.0.0"
description = "Cloudflare Workers D1 backend for Factos context-first Event Sourcing."
licences = ["Apache-2.0"]
target = "javascript"
links = [
  { title = "Factos", href = "https://factos.hexdocs.pm" },
  { title = "Simply Event Sourcing", href = "https://ricofritzsche.me/simply-event-sourcing/" },
]

[dependencies]
factos = { git = "https://github.com/renatillas/factos", ref = "main" } 
cf = { path = "../../../cf" }
gleam_javascript = ">= 1.0.0 and < 2.0.0"
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
gleam_time = ">= 1.8.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"

[dev_dependencies]
cf_miniflare = { path = "../../../cf_miniflare" }
gleeunit = ">= 1.0.0 and < 2.0.0"
